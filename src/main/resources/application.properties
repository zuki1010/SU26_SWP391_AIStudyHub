# ===================================================================
# DATABASE CONFIGURATION (SUPABASE POSTGRESQL - PORT 6543)
# ===================================================================
spring.datasource.url=jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0&stringtype=unspecified
spring.datasource.username=postgres.ybgeblpkptrsefpafthb
spring.datasource.password=DHRK7cgKgqi3K8MS
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.sql.init.mode=never

# ===================================================================
# TẮT XUNG ĐỘT AWS S3 AUTOCONFIGURATION (QUAN TRỌNG)
# ===================================================================
spring.cloud.aws.s3.enabled=false
spring.cloud.aws.region.auto=false
spring.cloud.aws.credentials.instance-profile=false

# ===================================================================
# THÔNG TIN XÁC THỰC VÀ BẢO MẬT
# ===================================================================
spring.thymeleaf.check-template-location=false
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

app.jwt.secret=ChangeMeInApplicationLocalPropertiesMustBeAtLeast256BitsLongForHS256!!
app.jwt.access-expiration-ms=900000
app.jwt.refresh-expiration-ms=604800000
app.jwt.reset-expiration-ms=3600000

app.frontend.reset-password-url=http://localhost:5173/reset-password
app.mail.from=noreply@aistudyhub.local

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

