spring.application.name=SU26_SWP391_AIStudyHub

# ===================================================================
# SERVER
# ===================================================================
server.port=${PORT:8080}

# ===================================================================
# DATABASE CONFIGURATION
# ===================================================================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.sql.init.mode=never

# ===================================================================
# TẮT XUNG ĐỘT AWS S3 AUTOCONFIGURATION
# ===================================================================
spring.cloud.aws.s3.enabled=false
spring.cloud.aws.region.auto=false
spring.cloud.aws.credentials.instance-profile=false

# ===================================================================
# THYMELEAF
# ===================================================================
spring.thymeleaf.check-template-location=false
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ===================================================================
# JWT CONFIGURATION
# ===================================================================
app.jwt.secret=${JWT_SECRET}
app.jwt.access-expiration-ms=900000
app.jwt.refresh-expiration-ms=604800000
app.jwt.reset-expiration-ms=3600000

app.frontend.reset-password-url=${FRONTEND_URL:http://localhost:5173}/reset-password
app.mail.from=noreply@aistudyhub.local

# ===================================================================
# SWAGGER
# ===================================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ===================================================================
# SUPABASE STORAGE
# ===================================================================
supabase.url=${SUPABASE_URL}
supabase.bucket-name=${SUPABASE_BUCKET_NAME}

# Nếu code CloudStorageServiceImpl đang dùng supabase.anon-key thì giữ dòng này:
supabase.anon-key=${SUPABASE_SERVICE_ROLE_KEY}

# Nếu bạn đã sửa code sang service-role-key thì dùng thêm dòng này:
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY}

# ===================================================================
# GEMINI
# ===================================================================
gemini.api.key=${GEMINI_API_KEY:test-key}

# ===================================================================
# MULTIPART UPLOAD
# ===================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=120MB
server.tomcat.max-swallow-size=120MB