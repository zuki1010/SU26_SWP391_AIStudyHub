spring.application.name=SU26_SWP391_AIStudyHub

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=SWP391_AIStudyHub;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=12345
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=never

spring.thymeleaf.cache=false 
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# JWT (override secret in application-local.properties)
app.jwt.secret=ChangeMeInApplicationLocalPropertiesMustBeAtLeast256BitsLongForHS256!!
app.jwt.access-expiration-ms=900000
app.jwt.refresh-expiration-ms=604800000
app.jwt.reset-expiration-ms=3600000

# Password reset (override in application-local.properties)
app.frontend.reset-password-url=http://localhost:3000/reset-password
app.mail.from=noreply@aistudyhub.local

# Mail optional - configure in application-local.properties for real SMTP
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=
# spring.mail.password=
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method